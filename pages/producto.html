<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modaveli - Producto</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/cormorant-garamond@5.2.11/index.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/dm-sans@5.2.8/index.css">
    <style>
        :root {
            --bg: #080808;
            --surface: #111111;
            --surface-2: #181818;
            --border: #2a2a2a;
            --gold: #c9a84c;
            --gold-light: #e8c97a;
            --text: #f0ece4;
            --muted: #6b6560;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            background:
                radial-gradient(circle at 10% 10%, rgba(201, 168, 76, 0.12), transparent 28%),
                radial-gradient(circle at 90% 90%, rgba(201, 168, 76, 0.10), transparent 30%),
                var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
        }

        .page-wrap {
            width: min(1100px, 94vw);
            margin: 2rem auto;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.2rem;
        }

        .logo {
            color: var(--gold);
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.6rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
        }

        .panel {
            background: linear-gradient(150deg, var(--surface), #0e0e0e);
            border: 1px solid var(--border);
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            overflow: hidden;
        }

        .media {
            background: #0e0e0e;
            min-height: 460px;
            display: grid;
            place-items: center;
            border-right: 1px solid var(--border);
            padding: 1rem;
        }

        .media img {
            width: min(420px, 100%);
            height: auto;
            object-fit: contain;
            border: 1px solid var(--border);
            background: #121212;
        }

        .content {
            padding: 2rem;
            display: grid;
            gap: 1rem;
            align-content: start;
        }

        .kicker {
            color: var(--muted);
            font-size: 0.68rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
        }

        h1 {
            font-family: 'Cormorant Garamond', serif;
            margin: 0;
            font-size: clamp(2rem, 4vw, 3rem);
            line-height: 0.95;
            color: var(--text);
        }

        .price {
            color: var(--gold);
            font-size: 1.4rem;
            font-family: 'Cormorant Garamond', serif;
        }

        .stock {
            font-size: 0.9rem;
            color: var(--muted);
        }

        .label {
            display: block;
            color: var(--muted);
            font-size: 0.68rem;
            text-transform: uppercase;
            letter-spacing: 0.16em;
            margin-bottom: 0.35rem;
        }

        .option-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(58px, 1fr));
            gap: 0.5rem;
        }

        .option-btn {
            min-height: 42px;
            border: 1px solid var(--border);
            background: var(--surface-2);
            color: var(--text);
            font-size: 0.82rem;
            font-weight: 600;
            cursor: pointer;
            transition: border-color 0.2s, transform 0.2s, color 0.2s;
        }

        .option-btn:hover {
            border-color: var(--gold-light);
            transform: translateY(-1px);
        }

        .option-btn.active {
            border-color: var(--gold);
            color: var(--gold);
            background: #111;
        }

        .option-btn.disabled {
            opacity: 0.45;
            cursor: not-allowed;
            text-decoration: line-through;
            transform: none;
        }

        .helper {
            margin-top: 0.45rem;
            font-size: 0.76rem;
            color: var(--muted);
        }

        .form-select,
        .form-control {
            background: var(--surface-2);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .form-select:focus,
        .form-control:focus {
            background: var(--surface-2);
            color: var(--text);
            border-color: var(--gold);
            box-shadow: none;
        }

        .btn-gold {
            background: var(--gold);
            color: #080808;
            border: 1px solid var(--gold);
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            font-size: 0.78rem;
        }

        .btn-gold:hover { background: var(--gold-light); border-color: var(--gold-light); }

        .btn-outline-soft {
            border: 1px solid var(--border);
            color: var(--muted);
            background: transparent;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-size: 0.78rem;
        }

        .btn-outline-soft:hover { border-color: var(--gold); color: var(--gold); }

        #mensajeProducto {
            min-height: 1.2rem;
            font-size: 0.85rem;
        }

        @media (max-width: 900px) {
            .panel { grid-template-columns: 1fr; }
            .media { border-right: none; border-bottom: 1px solid var(--border); min-height: 300px; }
            .content { padding: 1.2rem; }
        }
    </style>
</head>
<body>
    <main class="page-wrap">
        <div class="topbar">
            <div class="logo">Modaveli</div>
            <div class="d-flex gap-2">
                <button id="btnIrCarrito" class="btn btn-outline-soft">Carrito</button>
                <button id="btnVolverTienda" class="btn btn-outline-soft">Volver a tienda</button>
            </div>
        </div>

        <section class="panel">
            <div class="media">
                <img id="imgProducto" src="../assets/placeholder-product.svg" alt="Producto">
            </div>

            <div class="content">
                <p id="categoriaProducto" class="kicker">Producto</p>
                <h1 id="nombreProducto">Cargando…</h1>
                <div id="precioProducto" class="price">0.00 EUR</div>
                <div id="stockProducto" class="stock">Stock: --</div>

                <div>
                    <label class="label">Tallas disponibles</label>
                    <div id="gridTallas" class="option-grid"></div>
                </div>

                <div>
                    <label class="label">Colores disponibles</label>
                    <div id="gridColores" class="option-grid"></div>
                    <p id="stockCombinacion" class="helper"></p>
                </div>

                <div>
                    <label class="label" for="txtCantidadDetalle">Cantidad</label>
                    <input id="txtCantidadDetalle" class="form-control" type="number" min="1" step="1" value="1">
                </div>

                <div class="d-grid gap-2">
                    <button id="btnAgregarDesdeDetalle" class="btn btn-gold">Anadir al carrito</button>
                </div>

                <div id="mensajeProducto"></div>
            </div>
        </section>
    </main>

    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
    <script type="module" src="../js/producto.js"></script>
</body>
</html>
