<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Modaveli - Ventas</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/cormorant-garamond@5.2.11/index.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/dm-sans@5.2.8/index.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/dm-mono@5.2.7/index.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #080808;
            --surface: #111111;
            --surface-2: #181818;
            --border: #242424;
            --gold: #c9a84c;
            --gold-light: #e8c97a;
            --text: #f0ece4;
            --muted: #6b6560;
            --danger: #c94c4c;
            --success: #4ca874;
            --warning: #c9914c;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-weight: 300;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        h1, h2, h3, h4, .brand {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 400;
            letter-spacing: 0.05em;
        }

        /* --- NAVBAR --- */
        .navbar {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .navbar .brand { font-size: 1.5rem; color: var(--gold); text-transform: uppercase; }

        /* --- BOTONES --- */
        .btn {
            background: transparent;
            color: var(--text);
            border: 1px solid var(--border);
            padding: 0.5rem 1rem;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.85rem;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn:hover { background: var(--surface-2); border-color: var(--muted); }
        .btn-danger { border-color: var(--danger); color: var(--danger); }
        .btn-danger:hover { background: rgba(201, 76, 76, 0.1); }
        .btn-gold { background: var(--gold); color: var(--bg); border-color: var(--gold); font-weight: 500; }
        .btn-gold:hover { background: var(--gold-light); }
        .btn-outline { border-color: var(--gold); color: var(--gold); }
        .btn-outline:hover { background: rgba(201, 168, 76, 0.1); }

        /* --- LAYOUT PRINCIPAL --- */
        .container {
            flex: 1;
            padding: 2rem;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
            display: grid;
            grid-template-columns: 350px 1fr 350px; /* Ajustado un poco para dar más espacio al historial */
            gap: 2rem;
        }

        .panel {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .panel-title {
            color: var(--gold);
            font-size: 1.25rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.5rem;
            text-transform: uppercase;
        }

        /* --- FORMULARIOS --- */
        .form-group { display: flex; flex-direction: column; gap: 0.5rem; }
        label { font-size: 0.75rem; text-transform: uppercase; color: var(--muted); }
        input, select {
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.75rem;
            font-family: 'DM Mono', monospace;
            font-size: 0.9rem;
        }
        input:focus, select:focus { outline: none; border-color: var(--gold); }

        /* --- TABLAS (Usadas en Inventario y Últimas Ventas) --- */
        .table-wrapper { overflow-x: auto; flex-grow: 1;}
        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        th, td { padding: 1rem 0.5rem; text-align: left; border-bottom: 1px solid var(--border); }
        th { font-size: 0.75rem; text-transform: uppercase; color: var(--muted); }
        td { font-family: 'DM Mono', monospace; }
        
        .td-name { font-family: 'DM Sans', sans-serif; font-size: 1rem; color: var(--text); }
        .td-cat  { font-size: 0.75rem; color: var(--muted); display: block; margin-top: 0.2rem;}
        .td-precio { color: var(--gold); font-weight: 500; }
        .td-hora { font-size: 0.8rem; color: var(--muted); }
        .td-qty { color: var(--gold); font-weight: bold; }

        .status-ok  { color: var(--success); }
        .status-low { color: var(--danger); }

        /* --- MENSAJES --- */
        #mensajeVenta {
            font-size: 0.85rem;
            text-align: center;
            font-family: 'DM Mono', monospace;
            min-height: 1.2rem;
        }
        .msg-success { color: var(--success); }
        .msg-error   { color: var(--danger); }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="brand">Caja Registradora</div>
        <button id="btnCerrarSesion" class="btn btn-danger">Cerrar Sesión</button>
    </nav>

    <div class="container">

        <div class="panel">
            <h2 class="panel-title">Nueva Venta</h2>
            <div class="form-group">
                <label>Producto</label>
                <select id="cmbProductoVenta"></select>
            </div>
            <div class="form-group">
                <label>Cantidad</label>
                <input type="number" id="txtCantidadVenta" value="1" min="1">
            </div>
            <button id="btnVender" class="btn btn-gold" style="margin-top: 1rem; padding: 1rem;">Confirmar Transacción</button>
            <div id="mensajeVenta"></div>
        </div>

        <div class="panel">
            <h2 class="panel-title">Inventario</h2>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Artículo</th>
                            <th>Talla</th>
                            <th>Stock</th>
                            <th>Precio</th>
                        </tr>
                    </thead>
                    <tbody id="tablaVentas">
                        </tbody>
                </table>
            </div>
        </div>

        <div class="panel">
            <h2 class="panel-title">Últimas 5 Ventas</h2>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Hora</th>
                            <th>Pedido</th>
                            <th>Pack</th>
                        </tr>
                    </thead>
                    <tbody id="tablaHistorial">
                        </tbody>
                </table>
            </div>
            <button id="btnVerHistorial" class="btn btn-outline" style="width: 100%; margin-top: auto;">Ver Historial Completo</button>
        </div>

    </div>

    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
    <script type="module" src="../js/ventas.js"></script>
</body>
</html>
