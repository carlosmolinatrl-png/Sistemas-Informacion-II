<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Modaveli - Mi Perfil</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/cormorant-garamond@5.2.11/index.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/dm-sans@5.2.8/index.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/dm-mono@5.2.7/index.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #080808;
            --surface: #111111;
            --border: #242424;
            --gold: #c9a84c;
            --gold-light: #e8c97a;
            --text: #f0ece4;
            --muted: #6b6560;
            --danger: #c94c4c;
            --success: #4ca874;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
        }

        .navbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 2.5rem;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.4rem;
            letter-spacing: 0.2em;
            color: var(--gold);
            text-transform: uppercase;
        }

        .nav-actions { display: flex; align-items: center; gap: 0.75rem; }

        .btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
            font-size: 0.72rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            padding: 0.55rem 0.95rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn:hover { border-color: var(--gold); color: var(--gold); }
        .btn-danger { border-color: var(--danger); color: var(--danger); }
        .btn-danger:hover { background: rgba(201, 76, 76, 0.1); }

        .container {
            padding: 2.25rem;
            display: grid;
            grid-template-columns: 360px 1fr;
            gap: 1.5rem;
        }

        .panel {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 1.4rem;
        }

        .title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.7rem;
            color: var(--gold);
            margin-bottom: 0.3rem;
        }

        .subtitle {
            font-size: 0.7rem;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 1.2rem;
        }

        .group { margin-bottom: 1rem; }
        .group label {
            display: block;
            font-size: 0.68rem;
            color: var(--muted);
            letter-spacing: 0.12em;
            text-transform: uppercase;
            margin-bottom: 0.35rem;
        }

        .value {
            border: 1px solid var(--border);
            background: #0d0d0d;
            padding: 0.65rem 0.7rem;
            font-family: 'DM Mono', monospace;
            font-size: 0.84rem;
            word-break: break-word;
        }

        input {
            width: 100%;
            border: 1px solid var(--border);
            background: #0d0d0d;
            color: var(--text);
            padding: 0.65rem 0.7rem;
            font-size: 0.84rem;
        }
        input:focus { outline: none; border-color: var(--gold); }

        .btn-primary {
            width: 100%;
            border: 1px solid var(--gold);
            color: #080808;
            background: var(--gold);
            font-weight: 600;
        }
        .btn-primary:hover { background: var(--gold-light); color: #080808; }

        .feedback {
            margin-top: 0.65rem;
            min-height: 1.15rem;
            font-size: 0.78rem;
            font-family: 'DM Mono', monospace;
        }

        .ok { color: var(--success); }
        .error { color: var(--danger); }

        .orders-list {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            max-height: 72vh;
            overflow-y: auto;
            padding-right: 0.25rem;
        }

        .order-card {
            border: 1px solid var(--border);
            background: #0d0d0d;
            padding: 0.95rem;
        }

        .order-head {
            display: flex;
            justify-content: space-between;
            gap: 0.6rem;
            border-bottom: 1px dashed var(--border);
            padding-bottom: 0.55rem;
            margin-bottom: 0.55rem;
            align-items: baseline;
        }

        .order-id {
            font-family: 'DM Mono', monospace;
            color: var(--muted);
            font-size: 0.74rem;
        }

        .order-date {
            font-size: 0.76rem;
            color: var(--muted);
            letter-spacing: 0.06em;
        }

        .order-total {
            font-family: 'Cormorant Garamond', serif;
            color: var(--gold);
            font-size: 1.3rem;
            font-weight: 600;
        }

        .order-item {
            display: grid;
            grid-template-columns: 1fr auto auto;
            gap: 0.45rem;
            font-size: 0.85rem;
            padding: 0.22rem 0;
            border-bottom: 1px solid rgba(36,36,36,0.45);
        }
        .order-item:last-child { border-bottom: none; }

        .empty {
            border: 1px dashed var(--border);
            padding: 1rem;
            color: var(--muted);
            font-size: 0.85rem;
            text-align: center;
        }

        @media (max-width: 980px) {
            .container { grid-template-columns: 1fr; }
            .orders-list { max-height: none; }
            .navbar { padding: 0.85rem 1rem; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">Mi Perfil</div>
        <div class="nav-actions">
            <button class="btn" id="btnVolver">Volver a tienda</button>
            <button class="btn btn-danger" id="btnCerrarSesion">Cerrar sesion</button>
        </div>
    </nav>

    <main class="container">
        <section class="panel">
            <h1 class="title">Datos del Cliente</h1>
            <p class="subtitle">Informacion personal y seguridad</p>

            <div class="group">
                <label>Nombre</label>
                <div class="value" id="lblNombre">-</div>
            </div>
            <div class="group">
                <label>Direccion</label>
                <div class="value" id="lblDireccion">-</div>
            </div>
            <div class="group">
                <label>Correo</label>
                <div class="value" id="lblCorreo">-</div>
            </div>

            <div class="group">
                <label>Actualizar nombre</label>
                <input type="text" id="txtNombre" placeholder="Nombre completo">
            </div>
            <div class="group">
                <label>Actualizar direccion</label>
                <input type="text" id="txtDireccion" placeholder="Direccion de entrega">
            </div>
            <button class="btn btn-primary" id="btnGuardarPerfil">Guardar datos</button>
            <p class="feedback" id="msgPerfil"></p>

            <hr style="border-color: var(--border); margin: 1.2rem 0;">

            <div class="group">
                <label>Nuevo correo</label>
                <input type="email" id="txtNuevoCorreo" placeholder="nuevo@correo.com">
            </div>
            <div class="group">
                <label>Contrasena actual (requerida)</label>
                <input type="password" id="txtClaveCorreo" placeholder="Contrasena actual">
            </div>
            <button class="btn" id="btnCambiarCorreo">Cambiar correo</button>
            <p class="feedback" id="msgCorreo"></p>

            <hr style="border-color: var(--border); margin: 1.2rem 0;">

            <div class="group">
                <label>Contrasena actual</label>
                <input type="password" id="txtClaveActual" placeholder="Contrasena actual">
            </div>
            <div class="group">
                <label>Nueva contrasena</label>
                <input type="password" id="txtClaveNueva" placeholder="Minimo 6 caracteres">
            </div>
            <button class="btn" id="btnCambiarClave">Cambiar contrasena</button>
            <p class="feedback" id="msgClave"></p>
        </section>

        <section class="panel">
            <h2 class="title">Mis Pedidos</h2>
            <p class="subtitle">Historial completo de compras</p>
            <div class="orders-list" id="listaPedidos"></div>
        </section>
    </main>

    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
    <script type="module" src="../js/perfil.js"></script>
</body>
</html>
